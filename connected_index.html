<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>Analyze At Ease</title><style>body{margin:0;font-family:Arial,sans-serif;background:#000;color:#fff}header,section,footer{padding:40px 20px;max-width:1100px;margin:auto}.gold{color:#d4af37}.card{background:#111;padding:20px;border-radius:16px;margin:10px 0}.btn{display:inline-block;background:#d4af37;color:#000;padding:12px 20px;border-radius:10px;text-decoration:none;font-weight:bold;border:none;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}input,textarea{width:100%;padding:12px;border-radius:10px;border:none;margin-top:10px}</style></head><body><header><h1 class='gold'>Analyze At Ease</h1><p>AI-powered data analysis, insights, reports and planning for businesses.</p></header><section><div class='card'><h2 class='gold'>AI Bot Connected</h2><input id='question' placeholder='Ask about your uploaded data'><input id='file' type='file'><button class='btn' onclick='sendData()'>Analyze Now</button><textarea id='result' rows='10' placeholder='Results will appear here'></textarea></div></section><script>async function sendData(){const f=document.getElementById('file').files[0];const q=document.getElementById('question').value;if(!f){alert('Please choose a file');return;}const fd=new FormData();fd.append('file',f);fd.append('question',q);const r=await fetch('https://analyse-at-ease-production.up.railway.app/analyze',{method:'POST',body:fd});const d=await r.json();document.getElementById('result').value=JSON.stringify(d,null,2);}</script><footer><p>© Analyze At Ease</p></footer></body></html>
